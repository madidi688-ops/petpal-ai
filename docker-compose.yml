services:
  postgres:
    # 若直连 Docker Hub 遇 TLS 证书问题，可先：
    # docker pull docker.m.daocloud.io/library/postgres:16-alpine
    # docker tag docker.m.daocloud.io/library/postgres:16-alpine postgres:16-alpine
    image: postgres:16-alpine
    container_name: petpal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: petpal
      POSTGRES_PASSWORD: petpal
      POSTGRES_DB: petpal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petpal"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: petpal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: petpal-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://petpal:petpal@postgres:5432/petpal?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 4000
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - ./ai-agents:/ai-agents
      - backend_uploads:/app/uploads
      - /app/node_modules

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: petpal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next


volumes:
  postgres_data:
  redis_data:
  backend_uploads: