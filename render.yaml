# PetPal AI — Render Blueprint（免费档）
# 打开：https://dashboard.render.com/select-repo?type=blueprint
#
# 修复说明：去掉 api↔web 的循环依赖；前端用运行时 API_BASE_URL，不再构建期绑死域名。

databases:
  - name: petpal-db
    plan: free
    databaseName: petpal
    user: petpal

services:
  - type: web
    name: petpal-api
    runtime: docker
    plan: free
    dockerfilePath: ./infra/docker/backend.Dockerfile.prod
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: REDIS_URL
        value: "off"
      - key: DATABASE_URL
        fromDatabase:
          name: petpal-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ARK_API_KEY
        sync: false
      - key: ARK_MODEL
        sync: false
      - key: ARK_AUDIO_MODEL
        sync: false

  - type: web
    name: petpal-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start -- -H 0.0.0.0 -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        fromService:
          name: petpal-api
          type: web
          property: host
