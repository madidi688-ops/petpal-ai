# PetPal AI — one-click deploy on Render (free tier friendly)
# Dashboard: New → Blueprint → this repo
# Docs: https://render.com/docs/blueprint-spec
#
# After first deploy, open the *web* service URL (not api).
# Cold start: free web services sleep after ~15m idle (first open may wait 30–60s).

databases:
  - name: petpal-db
    plan: free
    databaseName: petpal
    user: petpal

services:
  - type: web
    name: petpal-api
    runtime: docker
    plan: free
    dockerfilePath: ./infra/docker/backend.Dockerfile.prod
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: REDIS_URL
        value: "off"
      - key: DATABASE_URL
        fromDatabase:
          name: petpal-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          name: petpal-web
          type: web
          property: host
      - key: PUBLIC_BASE_URL
        fromService:
          name: petpal-api
          type: web
          property: host
      # 可空：不填则走演示模式；以后要在 Render 控制台补真实 Key
      - key: DEEPSEEK_API_KEY
        value: ""
      - key: ARK_API_KEY
        value: ""
      - key: ARK_MODEL
        value: ""
      - key: ARK_AUDIO_MODEL
        value: ""

  - type: web
    name: petpal-web
    runtime: docker
    plan: free
    dockerfilePath: ./infra/docker/frontend.Dockerfile.prod
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: petpal-api
          type: web
          property: host
