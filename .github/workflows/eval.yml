name: eval
on:
  push:
    paths:
      - 'ai-agents/evals/**'
      - '.github/workflows/eval.yml'
  pull_request:
    paths:
      - 'ai-agents/evals/**'
  workflow_dispatch:

jobs:
  offline-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run prompt evals
        run: npm run eval
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: ai-agents/evals/out/latest.json
